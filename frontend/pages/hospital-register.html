<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Register - BloodConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 fade-in">

<nav class="bg-red-700 text-white p-4 shadow-lg fixed w-full top-0 z-50">
  <div class="container mx-auto flex justify-between items-center">
    <div class="text-xl font-bold">🩸 BloodConnect</div>
    <div class="hidden md:flex items-center space-x-6">
      <a href="../index.html" class="hover:text-red-200 transition">Home</a>
      <a href="../index.html#about" class="hover:text-red-200 transition">About</a>
      <a href="login.html" class="hover:text-red-200 transition">Login</a>
      <button onclick="toggleDarkMode()" class="bg-white text-red-700 px-3 py-1 rounded hover:bg-gray-100 transition" id="darkModeBtn">🌙</button>
    </div>
    <button class="md:hidden text-white text-2xl" onclick="toggleMobileMenu()" id="mobileMenuBtn">
      <i class="fas fa-bars"></i>
    </button>
  </div>
  <div class="md:hidden bg-red-800 mt-4 rounded-lg hidden" id="mobileMenu">
    <a href="../index.html" class="block px-4 py-2 hover:bg-red-600 transition">Home</a>
    <a href="../index.html#about" class="block px-4 py-2 hover:bg-red-600 transition">About</a>
    <a href="login.html" class="block px-4 py-2 hover:bg-red-600 transition">Login</a>
  </div>
</nav>

<div class="flex items-center justify-center min-h-screen py-24 px-4">
  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <div class="text-center mb-6">
      <div class="text-6xl mb-4">🏥</div>
      <h2 class="text-3xl font-bold text-gray-800">Hospital Registration</h2>
      <p class="text-gray-600 mt-2">Register your hospital to access blood donation services</p>
    </div>

    <form id="hospitalRegisterForm">
      <div class="mb-4">
        <label for="hospitalName" class="block text-sm font-medium text-gray-700 mb-1">Hospital Name</label>
        <div class="relative">
          <input type="text" id="hospitalName" placeholder="City General Hospital" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-hospital absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <div class="relative">
          <input type="email" id="email" placeholder="admin@hospital.com" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-envelope absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="mb-4">
        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
        <div class="relative">
          <input type="tel" id="phone" placeholder="+1 (555) 123-4567" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-phone absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="mb-4">
        <label for="address" class="block text-sm font-medium text-gray-700 mb-1">Address</label>
        <div class="relative">
          <input type="text" id="address" placeholder="123 Main St, City, State" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-map-marker-alt absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="mb-4">
        <label for="licenseNumber" class="block text-sm font-medium text-gray-700 mb-1">License Number</label>
        <div class="relative">
          <input type="text" id="licenseNumber" placeholder="HOSP-12345" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-certificate absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <input type="password" id="password" placeholder="Enter password" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-lock absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="mb-6">
        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <div class="relative">
          <input type="password" id="confirmPassword" placeholder="Confirm password" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-lock absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700 transition">
        <i class="fas fa-user-plus mr-2"></i>Register Hospital
      </button>
    </form>

    <div class="text-center mt-6">
      <p class="text-gray-600">Already have an account? <a href="login.html" class="text-red-600 hover:text-red-800 font-semibold">Login here</a></p>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
<script>
document.getElementById('hospitalRegisterForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const hospitalName = document.getElementById('hospitalName').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const address = document.getElementById('address').value;
  const licenseNumber = document.getElementById('licenseNumber').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    alert('Passwords do not match');
    return;
  }

  try {
    const response = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        name: hospitalName,
        email,
        password,
        phone,
        role: 'hospital',
        hospitalName,
        licenseNumber,
        address
      }),
    });

    const data = await response.json();
    
    if (data.success) {
      alert('Hospital registered successfully! Please login.');
      window.location.href = 'login.html';
    } else {
      alert(data.message || 'Registration failed');
    }
  } catch (error) {
    console.error('Error:', error);
    alert('An error occurred during registration');
  }
});
</script>

<footer class="bg-red-700 text-white mt-16">
  <div class="container mx-auto px-4 py-8">
    <div class="text-center">
      <p>© 2026 BloodConnect. All rights reserved.</p>
      <div class="flex justify-center space-x-6 mt-4">
        <a href="terms-of-service.html" class="text-red-200 hover:text-white transition text-sm">Terms of Service</a>
        <a href="privacy-policy.html" class="text-red-200 hover:text-white transition text-sm">Privacy Policy</a>
      </div>
    </div>
  </div>
</footer>

</body>
</html>
