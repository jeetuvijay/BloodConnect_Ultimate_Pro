
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - BloodConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 fade-in">

<nav class="bg-red-700 text-white p-4 shadow-lg fixed w-full top-0 z-50">
  <div class="container mx-auto flex justify-between items-center">
    <div class="text-xl font-bold">🩸 BloodConnect</div>
    <div class="hidden md:flex items-center space-x-6">
      <a href="index.html" class="hover:text-red-200 transition">Home</a>
      <a href="index.html#about" class="hover:text-red-200 transition">About</a>
      <a href="login.html" class="hover:text-red-200 transition">Login</a>
      <button onclick="toggleDarkMode()" class="bg-white text-red-700 px-3 py-1 rounded hover:bg-gray-100 transition" id="darkModeBtn">🌙</button>
    </div>
    <button class="md:hidden text-white text-2xl" onclick="toggleMobileMenu()" id="mobileMenuBtn">
      <i class="fas fa-bars"></i>
    </button>
  </div>
  <div class="md:hidden bg-red-800 mt-4 rounded-lg hidden" id="mobileMenu">
    <a href="index.html" class="block px-4 py-2 hover:bg-red-600 transition">Home</a>
    <a href="index.html#about" class="block px-4 py-2 hover:bg-red-600 transition">About</a>
    <a href="login.html" class="block px-4 py-2 hover:bg-red-600 transition">Login</a>
  </div>
</nav>

<div class="flex items-center justify-center min-h-screen py-24 px-4">
  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <div class="text-center mb-6">
      <div class="text-6xl mb-4">🩸</div>
      <h2 class="text-3xl font-bold text-gray-800">Join BloodConnect</h2>
      <p class="text-gray-600 mt-2">Create your account and start saving lives</p>
    </div>

    <form id="registerForm">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label for="firstName" class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
          <div class="relative">
            <input type="text" id="firstName" placeholder="John" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
            <i class="fas fa-user absolute left-3 top-3.5 text-gray-400"></i>
          </div>
        </div>
        <div>
          <label for="lastName" class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
        </div>
      </div>

      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <div class="relative">
          <input type="email" id="email" placeholder="your@email.com" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-envelope absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="mb-4">
        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
        <div class="relative">
          <input type="tel" id="phone" placeholder="+1 (555) 123-4567" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-phone absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label for="bloodType" class="block text-sm font-medium text-gray-700 mb-1">Blood Type</label>
          <div class="relative">
            <select id="bloodType" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent appearance-none" required>
              <option value="">Select type</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
            </select>
            <i class="fas fa-tint absolute left-3 top-3.5 text-gray-400"></i>
            <i class="fas fa-chevron-down absolute right-3 top-3.5 text-gray-400"></i>
          </div>
        </div>
        <div>
          <label for="dateOfBirth" class="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>
          <input type="date" id="dateOfBirth" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
        </div>
      </div>

      <div class="mb-4">
        <label for="location" class="block text-sm font-medium text-gray-700 mb-1">Location</label>
        <div class="relative">
          <input type="text" id="location" placeholder="City, State/Country" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-map-marker-alt absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <input type="password" id="password" placeholder="Create a strong password" class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required minlength="8">
          <i class="fas fa-lock absolute left-3 top-3.5 text-gray-400"></i>
          <button type="button" onclick="togglePassword()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600" id="passwordToggle">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <p class="text-xs text-gray-500 mt-1">Must be at least 8 characters long</p>
      </div>

      <div class="mb-6">
        <label class="flex items-start">
          <input type="checkbox" id="terms" class="mt-1 mr-2">
          <span class="text-sm text-gray-600">I agree to the <a href="#" class="text-red-600 hover:text-red-800">Terms of Service</a> and <a href="#" class="text-red-600 hover:text-red-800">Privacy Policy</a></span>
        </label>
      </div>

      <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700 transition duration-200 mb-4">
        <span id="registerText">Create Account</span>
        <div class="loading hidden" id="registerLoading"></div>
      </button>
    </form>

    <div class="relative mb-6">
      <hr class="border-gray-300">
      <span class="absolute -top-2.5 left-1/2 transform -translate-x-1/2 bg-white px-3 text-sm text-gray-500">or</span>
    </div>

    <button class="w-full bg-gray-100 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-200 transition duration-200">
      <i class="fab fa-google mr-2"></i>Sign up with Google
    </button>

    <div class="mt-6 text-center">
      <p class="text-gray-600">Already have an account?
        <a href="login.html" class="text-red-600 hover:text-red-800 font-semibold ml-1">Sign in here</a>
      </p>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const firstName = document.getElementById('firstName').value;
  const lastName = document.getElementById('lastName').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const bloodType = document.getElementById('bloodType').value;
  const dateOfBirth = document.getElementById('dateOfBirth').value;
  const location = document.getElementById('location').value;
  const password = document.getElementById('password').value;
  const terms = document.getElementById('terms').checked;

  if (!firstName || !lastName || !email || !phone || !bloodType || !dateOfBirth || !location || !password || !terms) {
    showAlert('Please fill in all fields and agree to terms.', 'error');
    return;
  }

  if (password.length < 8) {
    showAlert('Password must be at least 8 characters long.', 'error');
    return;
  }

  // Show loading
  document.getElementById('registerText').classList.add('hidden');
  document.getElementById('registerLoading').classList.remove('hidden');

  try {
    const userData = {
      name: `${firstName} ${lastName}`,
      email,
      phone,
      bloodType,
      dateOfBirth,
      location,
      password,
      role: 'donor' // Default role for registration
    };

    const result = await register(userData);

    if (result.success) {
      showAlert('Registration successful! Please login with your credentials.');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    } else {
      showAlert(result.message, 'error');
    }
  } catch (error) {
    showAlert('Registration failed. Please try again.', 'error');
  } finally {
    // Hide loading
    document.getElementById('registerText').classList.remove('hidden');
    document.getElementById('registerLoading').classList.add('hidden');
  }
});

function togglePassword() {
  const passwordInput = document.getElementById('password');
  const toggleBtn = document.getElementById('passwordToggle');

  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    toggleBtn.innerHTML = '<i class="fas fa-eye-slash"></i>';
  } else {
    passwordInput.type = 'password';
    toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';
  }
}
</script>

<footer class="bg-red-700 text-white mt-16">
  <div class="container mx-auto px-4 py-8">
    <div class="text-center">
      <p>© 2026 BloodConnect. All rights reserved.</p>
      <div class="flex justify-center space-x-6 mt-4">
        <a href="terms-of-service.html" class="text-red-200 hover:text-white transition text-sm">Terms of Service</a>
        <a href="privacy-policy.html" class="text-red-200 hover:text-white transition text-sm">Privacy Policy</a>
      </div>
    </div>
  </div>
</footer>

</body>
</html>
