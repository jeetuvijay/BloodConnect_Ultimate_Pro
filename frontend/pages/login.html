
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - BloodConnect</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 fade-in">

<nav class="bg-red-700 text-white p-4 shadow-lg fixed w-full top-0 z-50">
  <div class="container mx-auto flex justify-between items-center">
    <div class="text-xl font-bold">🩸 BloodConnect</div>
    <div class="hidden md:flex items-center space-x-6">
      <a href="index.html" class="hover:text-red-200 transition">Home</a>
      <a href="index.html#about" class="hover:text-red-200 transition">About</a>
      <a href="register.html" class="hover:text-red-200 transition">Register</a>
      <button onclick="toggleDarkMode()" class="bg-white text-red-700 px-3 py-1 rounded hover:bg-gray-100 transition" id="darkModeBtn">🌙</button>
    </div>
    <button class="md:hidden text-white text-2xl" onclick="toggleMobileMenu()" id="mobileMenuBtn">
      <i class="fas fa-bars"></i>
    </button>
  </div>
  <div class="md:hidden bg-red-800 mt-4 rounded-lg hidden" id="mobileMenu">
    <a href="index.html" class="block px-4 py-2 hover:bg-red-600 transition">Home</a>
    <a href="index.html#about" class="block px-4 py-2 hover:bg-red-600 transition">About</a>
    <a href="register.html" class="block px-4 py-2 hover:bg-red-600 transition">Register</a>
  </div>
</nav>

<div class="flex items-center justify-center min-h-screen py-24 px-4">
  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <div class="text-center mb-6">
      <div class="text-6xl mb-4">🩸</div>
      <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
      <p class="text-gray-600 mt-2">Sign in to your BloodConnect account</p>
    </div>

    <form id="loginForm">
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <div class="relative">
          <input type="email" id="email" placeholder="your@email.com" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-envelope absolute left-3 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <input type="password" id="password" placeholder="Enter your password" class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" required>
          <i class="fas fa-lock absolute left-3 top-3.5 text-gray-400"></i>
          <button type="button" onclick="togglePassword()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600" id="passwordToggle">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center justify-between mb-6">
        <label class="flex items-center">
          <input type="checkbox" id="remember" class="mr-2">
          <span class="text-sm text-gray-600">Remember me</span>
        </label>
        <a href="#" class="text-sm text-red-600 hover:text-red-800">Forgot password?</a>
      </div>

      <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700 transition duration-200 mb-4">
        <span id="loginText">Sign In</span>
        <div class="loading hidden" id="loginLoading"></div>
      </button>
    </form>

    <div class="relative mb-6">
      <hr class="border-gray-300">
      <span class="absolute -top-2.5 left-1/2 transform -translate-x-1/2 bg-white px-3 text-sm text-gray-500">or</span>
    </div>

    <button class="w-full mb-4 bg-gray-100 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-200 transition duration-200">
      <i class="fab fa-google mr-2"></i>Continue with Google
    </button>

    <button onclick="guestLogin()" class="w-full bg-gray-100 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-200 transition duration-200">
      Continue as Guest
    </button>

    <div class="mt-6 text-center">
      <p class="text-gray-600">Don't have an account?
        <a href="register.html" class="text-red-600 hover:text-red-800 font-semibold ml-1">Register here</a>
      </p>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showAlert('Please fill in all fields.', 'error');
    return;
  }

  // Show loading
  document.getElementById('loginText').classList.add('hidden');
  document.getElementById('loginLoading').classList.remove('hidden');

  try {
    const result = await login(email, password);

    if (result.success) {
      showAlert('Login successful! Redirecting...');

      // Redirect based on user role
      setTimeout(() => {
        switch (result.user.role) {
          case 'admin':
            window.location.href = 'admin-dashboard.html';
            break;
          case 'hospital':
            window.location.href = 'hospital-dashboard.html';
            break;
          case 'donor':
          default:
            window.location.href = 'donor-dashboard.html';
            break;
        }
      }, 1000);
    } else {
      showAlert(result.message, 'error');
    }
  } catch (error) {
    showAlert('Login failed. Please try again.', 'error');
  } finally {
    // Hide loading
    document.getElementById('loginText').classList.remove('hidden');
    document.getElementById('loginLoading').classList.add('hidden');
  }
});

function togglePassword() {
  const passwordInput = document.getElementById('password');
  const toggleBtn = document.getElementById('passwordToggle');

  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    toggleBtn.innerHTML = '<i class="fas fa-eye-slash"></i>';
  } else {
    passwordInput.type = 'password';
    toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';
  }
}

function guestLogin() {
  showAlert('Continuing as guest...');
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 1000);
}
</script>

<footer class="bg-red-700 text-white mt-16">
  <div class="container mx-auto px-4 py-8">
    <div class="text-center">
      <p>© 2026 BloodConnect. All rights reserved.</p>
      <div class="flex justify-center space-x-6 mt-4">
        <a href="terms-of-service.html" class="text-red-200 hover:text-white transition text-sm">Terms of Service</a>
        <a href="privacy-policy.html" class="text-red-200 hover:text-white transition text-sm">Privacy Policy</a>
      </div>
    </div>
  </div>
</footer>

</body>
</html>
